version: '3.8'

services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: wc26_predictor
      MYSQL_USER: wc26
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-wc26pass}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./server/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "3000:3000"
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: wc26
      DB_PASSWORD: ${MYSQL_PASSWORD:-wc26pass}
      DB_NAME: wc26_predictor
      PORT: 3000
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql_data:
